name: W1-Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (astro ${{ matrix.astro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        astro: ['5', '6', '7']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Pin Astro version for this leg
        if: matrix.astro != '7'
        run: pnpm add -D astro@${{ matrix.astro }}
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit, CLI and build e2e tests
        run: pnpm test
      - name: Dev-server e2e (astro 7 leg only)
        if: matrix.astro == '7'
        run: pnpm run test:dev

  node-compat:
    name: node ${{ matrix.node }} compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      # Install with a pnpm-capable Node: pnpm@11 needs Node >=22.13 (node:sqlite)
      # and cannot run on the Node 20 leg. Install here, then switch to the matrix
      # Node below to exercise the published artifact on that runtime.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Smoke import under Node
        run: node -e "import('./src/index.js').then(m => { if (typeof m.default !== 'function') process.exit(1) })"
      - name: CLI runs under Node
        run: node bin/astro-aeo.js validate fixtures/dist-valid
